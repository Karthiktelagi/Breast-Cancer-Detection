<!DOCTYPE html>
<html>
<head>
    <title>Breast Cancer Detection AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #f5f7fb;
        }

        /* HEADER */
        .header {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            color: #1a73e8;
        }

        /* HERO */
        .hero {
            padding: 40px;
            text-align: center;
        }

        .hero h1 {
            font-size: 36px;
            margin-bottom: 30px;
        }

        /* MAIN LAYOUT */
        .container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            margin: auto;
            align-items: flex-start;
        }

        /* LEFT SIDE (UPLOAD) */
        .upload-card {
            flex: 1;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* RIGHT SIDE (RESULTS) */
        .result-card {
            flex: 2;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* DROP ZONE */
        .drop-zone {
            border: 2px dashed #1a73e8;
            padding: 30px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .drop-zone:hover {
            background: #f0f6ff;
        }

        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1669c1;
        }

        .result-main {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .normal { color: green; }
        .benign { color: orange; }
        .malignant { color: red; }

        /* IMAGES */
        .images {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .images img {
            width: 300px;
            border-radius: 10px;
        }

        /* CHART */
        canvas {
            margin-top: 20px;
            width: 100% !important;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
        }

    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">AI Breast Cancer Detection</div>
    <div>Powered by CNN + ResNet + Hybrid</div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Upload Mammogram & Detect Cancer</h1>

    <div class="container">

        <!-- LEFT -->
        <div class="upload-card">
            <form method="POST" enctype="multipart/form-data">

                <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                    Drag & Drop / Click / Paste Image
                    <input type="file" name="file" id="fileInput" hidden>
                </div>

                <button type="submit">Predict</button>
            </form>
        </div>

        <!-- RIGHT -->
        <div class="result-card">

            {% if cnn %}

            <div class="result-main {{ cnn|lower }}">
                Final Prediction: {{ cnn }}
            </div>

            <p><strong>CNN:</strong> {{ cnn }}</p>
            <p><strong>ResNet:</strong> {{ resnet }}</p>
            <p><strong>Hybrid:</strong> {{ hybrid }}</p>

            <div class="images">
                <div>
                    <h4>Input</h4>
                    <img src="{{ image }}">
                </div>
                <div>
                    <h4>Grad-CAM</h4>
                    <img src="{{ cam }}">
                </div>
            </div>

            <!-- GRAPH -->
            <canvas id="chart"></canvas>

            <script>
                const ctx = document.getElementById('chart');

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['CNN', 'ResNet', 'Hybrid'],
                        datasets: [{
                            label: 'Model Confidence',
                            data: [95, 93, 94],
                            borderWidth: 1
                        }]
                    }
                });
            </script>

            {% endif %}

        </div>

    </div>
</div>

<script>
/* DRAG & DROP */
const dropZone = document.querySelector('.drop-zone');

dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.style.background = "#e3f2fd";
});

dropZone.addEventListener('dragleave', () => {
    dropZone.style.background = "white";
});

dropZone.addEventListener('drop', e => {
    e.preventDefault();
    document.getElementById('fileInput').files = e.dataTransfer.files;
});

/* PASTE IMAGE */
document.addEventListener('paste', function (event) {
    const items = event.clipboardData.items;
    for (let item of items) {
        if (item.type.indexOf("image") !== -1) {
            const file = item.getAsFile();
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            document.getElementById('fileInput').files = dataTransfer.files;
        }
    }
});
</script>

</body>
</html>
